AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"

# ドキュメントコメントは必須にしない（KISS）。
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

# 文字列はダブルクォートで統一する。
Style/StringLiterals:
  EnforcedStyle: double_quotes

# 行長は緩めに設定する。
Layout/LineLength:
  Max: 120

# Sinatra のルーティングやビュー記述でブロックが長くなるため緩和する。
Metrics/BlockLength:
  Enabled: false

Metrics/MethodLength:
  Max: 25

# ストア系モジュール／アダプタ（週次ファイルの読み書き・暗号化ヘルパ等）はやや長くなるため緩和する。
Metrics/ModuleLength:
  Max: 130

Metrics/ClassLength:
  Max: 130

# キーワード引数は順序依存が無く自己記述的なため、パラメータ数のカウント対象外にする。
Metrics/ParameterLists:
  CountKeywordArgs: false
