name: CI

on:
  push:
    branches: [main]
  pull_request:

# サプライチェーン対策: 既定の GITHUB_TOKEN 権限を最小（読み取りのみ）にする。
permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Ruby version pins are consistent
        run: ruby bin/check_ruby_version
      - name: RuboCop
        run: bundle exec rubocop
      - name: RSpec (file backend)
        run: bundle exec rspec

  firestore:
    name: Firestore Adapter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Start Firestore emulator
        run: |
          docker run -d --name firestore -p 8085:8085 google/cloud-sdk:emulators \
            gcloud emulators firestore start --host-port=0.0.0.0:8085
          for i in $(seq 1 60); do
            curl -s -o /dev/null localhost:8085 && exit 0
            sleep 1
          done
          echo "Firestore emulator failed to start" >&2
          docker logs firestore || true
          exit 1
      - name: RSpec (firestore adapters)
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8085
          FIRESTORE_PROJECT_ID: sukesan-ci
        run: bundle exec rspec spec/stores

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: bundler-audit
        run: bundle exec bundler-audit check --update

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
